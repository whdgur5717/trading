name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      back_changed: ${{ steps.changed.outputs.back_any_changed }}
      front_changed: ${{ steps.changed.outputs.front_any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files_yaml: |
            back:
              - back/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/deploy.yml
            front:
              - front/**
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - .github/workflows/deploy.yml

  deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.back_changed == 'true' || needs.detect-changes.outputs.front_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint back
        if: ${{ needs.detect-changes.outputs.back_changed == 'true' }}
        run: pnpm --filter back exec eslint . --max-warnings 0

      - name: Test back
        if: ${{ needs.detect-changes.outputs.back_changed == 'true' }}
        run: pnpm --filter back test

      - name: Build back
        if: ${{ needs.detect-changes.outputs.back_changed == 'true' }}
        run: pnpm --filter back build

      - name: Lint front
        if: ${{ needs.detect-changes.outputs.front_changed == 'true' }}
        run: pnpm --filter front exec eslint . --max-warnings 0

      - name: Build front
        if: ${{ needs.detect-changes.outputs.front_changed == 'true' }}
        run: pnpm --filter front build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ARTIFACT_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push back image
        if: ${{ needs.detect-changes.outputs.back_changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: back/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ vars.ARTIFACT_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_BACK_SERVICE_NAME }}:${{ github.sha }}

      - name: Build and push front image
        if: ${{ needs.detect-changes.outputs.front_changed == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: front/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ vars.ARTIFACT_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_FRONT_SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy back to Cloud Run
        if: ${{ needs.detect-changes.outputs.back_changed == 'true' }}
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_BACK_SERVICE_NAME }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.CLOUD_RUN_REGION }}
          image: ${{ vars.ARTIFACT_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_BACK_SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy front to Cloud Run
        if: ${{ needs.detect-changes.outputs.front_changed == 'true' }}
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_FRONT_SERVICE_NAME }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          region: ${{ vars.CLOUD_RUN_REGION }}
          image: ${{ vars.ARTIFACT_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.CLOUD_RUN_FRONT_SERVICE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: curl --fail --silent --show-error --retry 5 --retry-delay 5 --retry-all-errors "${{ vars.PUBLIC_ORIGIN }}/api/health"
