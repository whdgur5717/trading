name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare turbo cache directory
        run: mkdir -p .turbo

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint workspace
        run: pnpm lint

      - name: Build workspace
        run: pnpm build

      - name: Write affected deployment targets
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
          TURBO_SCM_HEAD: ${{ github.sha }}
        run: pnpm exec turbo query affected --packages back front --base "$TURBO_SCM_BASE" --head "$TURBO_SCM_HEAD" --no-color --no-update-notifier > .turbo/affected.json

      - name: Detect affected deployment targets
        id: affected
        uses: actions/github-script@v8
        with:
          script: |
            const { readFileSync } = require("node:fs")

            const output = readFileSync(".turbo/affected.json", "utf8")
            const items = JSON.parse(output).data.affectedPackages.items
            const packages = items.map(({ name }) => name)

            core.info(`affected packages: ${packages.join(", ") || "none"}`)
            core.setOutput("back", String(packages.includes("back")))
            core.setOutput("front", String(packages.includes("front")))
            core.setOutput("packages", JSON.stringify(packages))

      - name: Deploy affected back
        if: steps.affected.outputs.back == 'true'
        uses: ./.github/actions/deploy-back
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-deploy-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ecr-registry: ${{ vars.ECR_REGISTRY }}
          ecr-back-repository: ${{ vars.ECR_BACK_REPOSITORY }}
          codedeploy-artifact-bucket: ${{ vars.CODEDEPLOY_ARTIFACT_BUCKET }}
          codedeploy-application-name: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
          codedeploy-deployment-group-name: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}

      - name: Deploy affected front Worker
        if: steps.affected.outputs.front == 'true'
        uses: ./.github/actions/deploy-front
        with:
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment
        if: steps.affected.outputs.back == 'true' || steps.affected.outputs.front == 'true'
        run: curl --fail --silent --show-error --retry 5 --retry-delay 5 --retry-all-errors "${{ vars.PUBLIC_ORIGIN }}/api/health"
