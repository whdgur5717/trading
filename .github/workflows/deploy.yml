name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      BACK_IMAGE_TAG: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_BACK_REPOSITORY }}:${{ github.sha }}
      CODEDEPLOY_ARTIFACT_KEY: codedeploy/trading-back/${{ github.sha }}.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare turbo cache directory
        run: mkdir -p .turbo

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      - name: Build workspace
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          mask-aws-account-id: true

      - name: Verify AWS CLI
        run: aws --version

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push back image
        id: build_back
        uses: docker/build-push-action@v6
        with:
          context: .
          file: back/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.BACK_IMAGE_TAG }}

      - name: Deploy back with CodeDeploy
        env:
          BACK_IMAGE_URI: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_BACK_REPOSITORY }}@${{ steps.build_back.outputs.digest }}
          CODEDEPLOY_ARTIFACT_BUCKET: ${{ vars.CODEDEPLOY_ARTIFACT_BUCKET }}
          CODEDEPLOY_APPLICATION_NAME: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP_NAME: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}
          CODEDEPLOY_WAIT_SECONDS: "900"
        run: node scripts/deploy/create-codedeploy-deployment.mjs
