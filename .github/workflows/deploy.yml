name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare turbo cache directory
        run: mkdir -p .turbo

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint workspace
        run: pnpm lint

      - name: Build workspace
        env:
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
        run: pnpm build

      - name: Write affected deployment targets
        env:
          TURBO_SCM_BASE: ${{ github.event.before }}
          TURBO_SCM_HEAD: ${{ github.sha }}
        run: pnpm exec turbo query affected --packages back front --base "$TURBO_SCM_BASE" --head "$TURBO_SCM_HEAD" --no-color --no-update-notifier > .turbo/affected.json

      - name: Detect affected deployment targets
        id: affected
        uses: actions/github-script@v8
        with:
          script: |
            const { readFileSync } = require("node:fs")

            const output = readFileSync(".turbo/affected.json", "utf8")
            const items = JSON.parse(output).data.affectedPackages.items
            const packages = items.map(({ name }) => name)
            const { owner, repo } = context.repo
            const { data: pullRequests } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha,
              })
            const pullRequest = pullRequests.find(({ merged_at }) => merged_at)
            let labels = []

            if (pullRequest) {
              const { data } = await github.rest.issues.listLabelsOnIssue({
                owner,
                repo,
                issue_number: pullRequest.number,
                per_page: 100,
              })
              labels = data.map(({ name }) => name)
            }

            core.info(`affected packages: ${packages.join(", ") || "none"}`)
            core.info(
              `deploy labels: ${
                labels.filter((label) => label.startsWith("deploy:")).join(", ") ||
                "none"
              }`,
            )
            core.setOutput(
              "back",
              String(
                packages.includes("back") ||
                  labels.includes("deploy:all") ||
                  labels.includes("deploy:back"),
              ),
            )
            core.setOutput(
              "front",
              String(
                packages.includes("front") ||
                  labels.includes("deploy:all") ||
                  labels.includes("deploy:front"),
              ),
            )
            core.setOutput("packages", JSON.stringify(packages))

      - name: Deploy affected back
        if: steps.affected.outputs.back == 'true'
        uses: ./.github/actions/deploy-back
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-deploy-role-arn: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          ecr-registry: ${{ vars.ECR_REGISTRY }}
          ecr-back-repository: ${{ vars.ECR_BACK_REPOSITORY }}
          codedeploy-artifact-bucket: ${{ vars.CODEDEPLOY_ARTIFACT_BUCKET }}
          codedeploy-application-name: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
          codedeploy-deployment-group-name: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP_NAME }}

      - name: Deploy affected front Worker
        if: steps.affected.outputs.front == 'true'
        uses: ./.github/actions/deploy-front
        with:
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
